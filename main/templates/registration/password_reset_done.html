{% extends 'dreamapp/header.html' %}
{% block title %}Check Your Email — Dream Analytica{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card reveal">
    <h1 class="auth-card__title goldman-regular">Check your email</h1>
    <p class="auth-card__sub">If an account exists for that email, we sent a password reset link.</p>
    <p class="auth-card__footer"><a href="{% url 'main:login' %}">Return to sign in</a></p>
  </div>
</div>
{% endblock %}
